global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "keiro_gateway"
    static_configs:
      - targets: ["gateway:8080"]
    metrics_path: "/metrics"

  - job_name: "keiro_intelligence"
    static_configs:
      - targets: ["intelligence:28080"]
    metrics_path: "/metrics"