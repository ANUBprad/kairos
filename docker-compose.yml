services:
  chromadb:
    image: chromadb/chroma:1.0.15
    ports:
      - "7777:8000"
    volumes:
      - chroma_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  intelligence:
    build:
      context: .
      dockerfile: docker/intelligence.Dockerfile
    ports:
      - "${INTELLIGENCE_PORT:-28080}:28080"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.settimeout(3); s.connect(('localhost',28080)); s.close()"]
      interval: 10s
      timeout: 20s
      retries: 5
      start_period: 120s
    depends_on:
      chromadb:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - KEIRO_ENVIRONMENT=${KEIRO_ENVIRONMENT:-development}
      - KEIRO_CHROMA_STORE_HOST=chromadb
      - KEIRO_INTELLIGENCE_HOST=intelligence
    restart: unless-stopped
    depends_on:
      intelligence:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard.Dockerfile
    ports:
      - "${DASHBOARD_PORT:-8501}:8501"
    env_file:
      - .env
    environment:
      - KEIRO_CHROMA_STORE_HOST=chromadb
      - KEIRO_INTELLIGENCE_HOST=intelligence
    restart: unless-stopped
    depends_on:
      - intelligence

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    env_file:
      - .env
    environment:
      - KEIRO_CHROMA_STORE_HOST=chromadb
    restart: unless-stopped
    depends_on:
      chromadb:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: docker/gateway.Dockerfile
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      - PYTHON_INTELLIGENCE_ADDR=intelligence:28080
    restart: unless-stopped
    depends_on:
      intelligence:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: unless-stopped
    depends_on:
      - gateway

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  chroma_data:
  prometheus_data:
  grafana_data: